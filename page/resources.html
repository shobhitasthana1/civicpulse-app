<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#060c14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>CivicPulse — City Resources</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../assets/css/style.css"/>
<link rel="stylesheet" href="../assets/css/mobile-fix.css"/>
<style>
:root { --teal:#00e5cc; --cyan:#00cfff; --purple:#a78bfa; --orange:#fb923c; --red:#ff4d6d; }
*, *::before, *::after { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html { font-size:16px; -webkit-text-size-adjust:100%; }
html,body { width:100%; max-width:100%; overflow-x:hidden; margin:0; padding:0; }

body::before {
  content:''; position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image: linear-gradient(rgba(0,229,204,0.025) 1px,transparent 1px),
                    linear-gradient(90deg,rgba(0,229,204,0.025) 1px,transparent 1px);
  background-size:40px 40px;
  mask-image:radial-gradient(ellipse at 50% 0%,black 30%,transparent 80%);
  -webkit-mask-image:radial-gradient(ellipse at 50% 0%,black 30%,transparent 80%);
}

.slbl { font-family:'Syne',sans-serif; font-size:0.62rem; font-weight:700; letter-spacing:1.6px; text-transform:uppercase; color:rgba(0,229,204,0.65); display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.slbl::after { content:''; flex:1; height:1px; background:linear-gradient(to right,rgba(0,229,204,0.2),transparent); }
.fu { opacity:0; transform:translateY(16px); animation:fu .4s ease forwards; }
@keyframes fu { to { opacity:1; transform:translateY(0); } }
.d1{animation-delay:.06s}.d2{animation-delay:.12s}.d3{animation-delay:.18s}

/* Search hero */
.search-hero {
  background:linear-gradient(135deg,rgba(0,229,204,0.07),rgba(0,207,255,0.04));
  border:1px solid rgba(0,229,204,0.15); border-radius:18px; padding:18px; margin-bottom:18px;
  position:relative; overflow:hidden;
}
.search-hero::before {
  content:''; position:absolute; top:-30px; right:-30px; width:120px; height:120px;
  background:radial-gradient(circle,rgba(0,229,204,0.1),transparent 70%); pointer-events:none;
}
.search-input {
  width:100%; background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.1);
  border-radius:12px; padding:12px 12px 12px 40px; font-size:0.85rem; color:#f1f5f9;
  outline:none; transition:.2s; font-family:'DM Sans',sans-serif;
}
.search-input:focus { border-color:rgba(0,229,204,0.4); background:rgba(0,229,204,0.05); }
.search-input::placeholder { color:#475569; }

/* Category chips */
.cat-row { display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin-bottom:18px; scrollbar-width:none; }
.cat-row::-webkit-scrollbar { display:none; }
.cchip {
  display:flex; align-items:center; gap:5px; padding:7px 14px; border-radius:50px;
  font-family:'Syne',sans-serif; font-size:0.7rem; font-weight:700;
  background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#94a3b8;
  white-space:nowrap; cursor:pointer; transition:.2s; flex-shrink:0;
}
.cchip.act { background:rgba(0,229,204,0.1); border-color:var(--teal); color:var(--teal); }
.cchip:active { transform:scale(0.95); }

/* Resource card */
.res-card {
  background:rgba(11,20,34,0.75); border:1px solid rgba(255,255,255,0.07);
  border-radius:18px; padding:16px; margin-bottom:12px;
  transition:border-color .2s;
}
.res-card:last-child { margin-bottom:0; }
.res-icon { width:50px; height:50px; border-radius:14px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); display:flex; align-items:center; justify-content:center; font-size:1.5rem; flex-shrink:0; }
.res-divider { height:1px; background:linear-gradient(to right,transparent,rgba(255,255,255,0.08),transparent); margin:12px 0; }
.btn-action {
  flex:1; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; gap:6px;
  font-size:0.78rem; font-weight:600; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1);
  color:#f1f5f9; transition:.2s; cursor:pointer; text-decoration:none; font-family:'DM Sans',sans-serif;
}
.btn-action:active { background:rgba(255,255,255,0.1); transform:scale(0.96); }
</style>
</head>

<body>
<canvas id="bg-canvas"></canvas>
<div class="app-layout">
<div class="main-area">

<!-- HEADER -->
<header class="app-header">
  <div class="header-left">
    <button class="hamburger" aria-label="Open navigation menu" type="button">
      <span></span><span></span><span></span>
    </button>
    <div style="display:flex;align-items:center;gap:7px;min-width:0;overflow:hidden;">
      <div class="logo-icon" style="width:26px;height:26px;border-radius:7px;flex-shrink:0;">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" fill="#060c14"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2" stroke="#060c14" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <span class="logo-text" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">CivicPulse</span>
    </div>
  </div>
  <div class="header-right" style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
    <div class="live-indicator"><span class="live-dot"></span>LIVE</div>
    <button class="icon-btn" style="position:relative;flex-shrink:0;" onclick="showToast('🔔 Notifications','info')" type="button" aria-label="Notifications">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="notif-badge"></span>
    </button>
    <div class="avatar" style="flex-shrink:0;overflow:hidden;padding:0;">
      <img src="../image/shobhit.png" alt="SA" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;" onerror="this.parentElement.textContent='SA';"/>
    </div>
  </div>
</header>

<!-- PAGE CONTENT -->
<main class="page-content">

  <!-- TITLE -->
  <div style="margin-bottom:18px;" class="fu">
    <div class="slbl">City Resources</div>
    <h1 style="font-family:'Syne',sans-serif;font-weight:800;font-size:1.4rem;color:#f1f5f9;margin-bottom:6px;">Find Nearby Help</h1>
    <p style="font-size:0.8rem;color:#64748b;">Locate hospitals, police stations, utilities, NGOs and public services near you.</p>
  </div>

  <!-- SEARCH -->
  <div class="search-hero fu d1">
    <div style="position:relative;z-index:1;">
      <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);pointer-events:none;" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#475569" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="search" class="search-input" placeholder="Search services, hospitals, police..." oninput="filterRes(this.value)" autocomplete="off"/>
    </div>
  </div>

  <!-- CATEGORIES -->
  <div class="cat-row fu d2">
    <button class="cchip act" onclick="setCat('all',this)">🌐 All</button>
    <button class="cchip" onclick="setCat('hospital',this)">🏥 Hospitals</button>
    <button class="cchip" onclick="setCat('police',this)">🚔 Police</button>
    <button class="cchip" onclick="setCat('fire',this)">🚒 Fire</button>
    <button class="cchip" onclick="setCat('water',this)">💧 Water</button>
    <button class="cchip" onclick="setCat('electric',this)">⚡ Electricity</button>
    <button class="cchip" onclick="setCat('ngo',this)">🤝 NGOs</button>
  </div>

  <!-- RESOURCES LIST -->
  <div id="resGrid" class="fu d3"></div>

</main>
</div>
</div>

<!-- FAB — Emergency -->
<a href="emergency.html" style="position:fixed;bottom:calc(var(--tab-h,62px) + env(safe-area-inset-bottom,0px) + 14px);right:max(14px,env(safe-area-inset-right,14px));z-index:45;display:flex;align-items:center;gap:7px;background:linear-gradient(135deg,#ff4d6d,#cc0033);color:white;font-family:'Syne',sans-serif;font-weight:800;font-size:0.78rem;padding:0 16px;height:46px;border-radius:23px;border:none;cursor:pointer;box-shadow:0 6px 28px rgba(255,77,109,0.4);text-decoration:none;white-space:nowrap;">
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
  Emergency SOS
</a>

<script src="../assets/js/app.js"></script>
<script src="../assets/js/shared-ui.js"></script>

<script>
const RES = [
  {id:1, cat:'hospital', icon:'🏥', name:'KGMU Hospital', desc:"King George's Medical University", dist:'1.2 km', tel:'0522-2257540', rating:4.5, info:'Beds Available'},
  {id:2, cat:'hospital', icon:'🏥', name:'Ram Manohar Lohia Hospital', desc:'State Government Hospital, Lucknow', dist:'2.8 km', tel:'0522-2288874', rating:4.2, info:'Limited Beds'},
  {id:3, cat:'police', icon:'🚔', name:'Hazratganj Police Station', desc:'District Police HQ, Civil Lines', dist:'0.9 km', tel:'0522-2614146', rating:3.8, info:''},
  {id:4, cat:'police', icon:'🚔', name:'Gomti Nagar Police Station', desc:'Sector 14, Gomti Nagar, Lucknow', dist:'1.7 km', tel:'0522-2308000', rating:4.0, info:''},
  {id:5, cat:'fire', icon:'🚒', name:'Fire Station – Alambagh', desc:'Near Alambagh Bus Stand', dist:'3.4 km', tel:'101', rating:4.6, info:''},
  {id:6, cat:'water', icon:'💧', name:'Jal Kal Vibhag', desc:'Water supply authority, Lucknow', dist:'2.2 km', tel:'0522-2286566', rating:3.7, info:''},
  {id:7, cat:'electric', icon:'⚡', name:'UPPCL Helpline', desc:'UP Power Corporation, Zone 3', dist:'1.8 km', tel:'1912', rating:3.5, info:''},
  {id:8, cat:'ngo', icon:'🤝', name:'Null Pointer Civic Team', desc:'CivicPulse Volunteer Network', dist:'0.2 km', tel:'+91 6388095158', rating:5.0, info:'Active Now'},
];

let activeCat = 'all', searchQ = '';

function getStars(r) { return '★'.repeat(Math.floor(r)) + (r%1?'½':'') + '☆'.repeat(5-Math.ceil(r)); }

function renderRes() {
  const grid = document.getElementById('resGrid');
  const items = RES.filter(r =>
    (activeCat==='all' || r.cat===activeCat) &&
    (r.name.toLowerCase().includes(searchQ) || r.desc.toLowerCase().includes(searchQ))
  );
  if (!items.length) {
    grid.innerHTML = `<div style="text-align:center;padding:40px 20px;color:#64748b;"><div style="font-size:2.5rem;margin-bottom:10px;opacity:.5;">🔍</div><div style="font-family:'Syne',sans-serif;font-weight:700;font-size:1rem;color:#f1f5f9;margin-bottom:4px;">No resources found</div><p style="font-size:0.78rem;">Try adjusting your filters or search.</p></div>`;
    return;
  }
  grid.innerHTML = items.map(r => `
    <div class="res-card">
      <div style="display:flex;align-items:flex-start;gap:12px;">
        <div class="res-icon">${r.icon}</div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
            <h3 style="font-family:'Syne',sans-serif;font-weight:700;font-size:0.9rem;color:#f1f5f9;margin:0;">${r.name}</h3>
            <span style="background:rgba(0,229,204,0.1);color:#00e5cc;border:1px solid rgba(0,229,204,0.25);padding:1px 8px;border-radius:20px;font-size:0.56rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;">● Open</span>
          </div>
          <p style="font-size:0.72rem;color:#64748b;margin:0 0 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${r.desc}</p>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
            <span style="background:rgba(0,207,255,0.1);color:#00cfff;border:1px solid rgba(0,207,255,0.2);padding:3px 8px;border-radius:8px;font-size:0.6rem;font-weight:700;">📍 ${r.dist}</span>
            <span style="font-size:0.6rem;color:#f59e0b;">${getStars(r.rating)} <span style="color:#64748b;">${r.rating}</span></span>
            ${r.info ? `<span style="font-size:0.6rem;color:#64748b;border-left:1px solid rgba(255,255,255,0.1);padding-left:8px;">${r.info}</span>` : ''}
          </div>
        </div>
      </div>
      <div class="res-divider"></div>
      <div style="display:flex;gap:10px;">
        <a href="tel:${r.tel}" class="btn-action" onclick="showToast('📞 Calling ${r.name}...','info')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.4 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.9a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>
          Call
        </a>
        <button class="btn-action" onclick="showToast('🗺 Opening directions...','info')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
          Directions
        </button>
      </div>
    </div>
  `).join('');
}

function setCat(c, btn) {
  activeCat = c;
  document.querySelectorAll('.cchip').forEach(b => b.classList.remove('act'));
  btn.classList.add('act');
  renderRes();
}
function filterRes(v) { searchQ = v.toLowerCase(); renderRes(); }

renderRes();
</script>
</body>
</html>
