<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#060c14"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>CivicPulse — Track Reports</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/css/style.css"/>
<link rel="stylesheet" href="assets/css/mobile-fix.css"/>
<style>
    :root {
        --teal: #00e5cc;
        --bg-dark: #060c14;
        --card-bg: rgba(11, 20, 34, 0.75);
    }

    body {
        background: var(--bg-dark);
        color: #f1f5f9;
        font-family: 'DM Sans', sans-serif;
        margin: 0;
        overflow-x: hidden;
    }

    /* Grid Background */
    body::before {
        content: '';
        position: fixed;
        inset: 0;
        z-index: -1;
        background-image: linear-gradient(rgba(0, 229, 204, 0.025) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(0, 229, 204, 0.025) 1px, transparent 1px);
        background-size: 40px 40px;
        mask-image: radial-gradient(ellipse at 50% 0%, black 30%, transparent 80%);
    }

    /* Typography & Utilities */
    .syne-font { font-family: 'Syne', sans-serif; }
    .mono-font { font-family: 'JetBrains Mono', monospace; }
    
    .fu { opacity: 0; transform: translateY(16px); animation: fu 0.4s ease forwards; }
    @keyframes fu { to { opacity: 1; transform: translateY(0); } }
    .d1{animation-delay: .05s} .d2{animation-delay: .10s} .d3{animation-delay: .15s}

    /* Hide Scrollbar for filters */
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Filter Pills */
    .fpill {
        padding: 8px 16px;
        border-radius: 50px;
        font-family: 'Syne', sans-serif;
        font-size: 0.75rem;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: #94a3b8;
        white-space: nowrap;
        transition: 0.2s;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
    }
    .fpill.act { background: rgba(0, 229, 204, 0.1); border-color: var(--teal); color: var(--teal); }

    /* Report Accordion Rows */
    .rrow {
        background: var(--card-bg);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 16px;
        overflow: hidden;
        transition: border-color 0.2s;
        -webkit-tap-highlight-color: transparent;
    }
    .rrow.exp { border-color: rgba(0, 229, 204, 0.3); }
    
    .rtop { padding: 16px; cursor: pointer; transition: background 0.2s; }
    .rtop:active { background: rgba(255, 255, 255, 0.03); }
    
    /* Smooth Accordion Animation */
    .rdetail {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease-in-out, padding 0.3s ease;
        padding: 0 16px;
    }
    .rdetail.open { max-height: 200px; padding: 0 16px 16px; }
    
    .chevron { transition: transform 0.3s ease; }
    .rrow.exp .chevron { transform: rotate(180deg); }

    /* Floating Action Button (FAB) */
    .fab-p {
        position: fixed;
        bottom: calc(24px + env(safe-area-inset-bottom));
        left: 50%;
        transform: translateX(-50%);
        background: linear-gradient(135deg, #00e5cc, #00cfff);
        color: #060c14;
        padding: 14px 24px;
        border-radius: 50px;
        font-weight: 800;
        font-family: 'Syne', sans-serif;
        display: flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 10px 25px rgba(0, 229, 204, 0.3);
        z-index: 100;
        width: calc(100% - 40px);
        max-width: 300px;
        justify-content: center;
        text-decoration: none;
    }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="app-layout">
<div class="main-area">

<!-- HEADER -->
<header class="app-header">
  <div class="header-left">
    <button class="hamburger" aria-label="Open navigation menu" type="button">
      <span></span><span></span><span></span>
    </button>
    <div style="display:flex;align-items:center;gap:7px;min-width:0;overflow:hidden;">
      <div class="logo-icon" style="width:26px;height:26px;border-radius:7px;flex-shrink:0;">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="8" r="3" fill="#060c14"/><path d="M8 1v2M8 13v2M1 8h2M13 8h2" stroke="#060c14" stroke-width="1.5" stroke-linecap="round"/></svg>
      </div>
      <span class="logo-text" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">CivicPulse</span>
    </div>
  </div>
  <div class="header-right" style="display:flex;align-items:center;gap:8px;flex-shrink:0;">
    <div class="live-indicator"><span class="live-dot"></span>LIVE</div>
    <button class="icon-btn" style="position:relative;flex-shrink:0;" onclick="showToast('🔔 Notifications','info')" type="button" aria-label="Notifications">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span class="notif-badge"></span>
    </button>
    <div class="avatar" style="flex-shrink:0;overflow:hidden;padding:0;">
      <img src="image/shobhit.png" alt="SA" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:block;" onerror="this.parentElement.textContent='SA';"/>
    </div>
  </div>
</header>

<main class="page-content">
<div style="max-width:760px;margin:0 auto;">
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-6 fu">
            <div class="bg-white/5 border border-white/10 rounded-2xl p-4 text-center">
                <div class="syne-font font-bold text-2xl text-white">19</div>
                <div class="text-[10px] uppercase text-slate-400 font-bold tracking-widest mt-1">Total</div>
            </div>
            <div class="bg-amber-500/5 border border-amber-500/10 rounded-2xl p-4 text-center">
                <div class="syne-font font-bold text-2xl text-amber-500">7</div>
                <div class="text-[10px] uppercase text-slate-400 font-bold tracking-widest mt-1">Pending</div>
            </div>
            <div class="bg-blue-500/5 border border-blue-500/10 rounded-2xl p-4 text-center">
                <div class="syne-font font-bold text-2xl text-[#00cfff]">5</div>
                <div class="text-[10px] uppercase text-slate-400 font-bold tracking-widest mt-1">Active</div>
            </div>
            <div class="bg-emerald-500/5 border border-emerald-500/10 rounded-2xl p-4 text-center">
                <div class="syne-font font-bold text-2xl text-[#00e5cc]">7</div>
                <div class="text-[10px] uppercase text-slate-400 font-bold tracking-widest mt-1">Resolved</div>
            </div>
        </div>

        <div class="relative mb-5 fu d1">
            <svg class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="search" class="w-full bg-white/5 border border-white/10 rounded-xl py-3.5 pl-12 pr-4 text-sm text-white placeholder-slate-500 focus:border-[#00e5cc] focus:bg-[#00e5cc]/5 outline-none transition" placeholder="Search by title, location, ID..." oninput="filterReports(this.value)" autocomplete="off"/>
        </div>

        <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2 mb-6 fu d2">
            <button class="fpill act" onclick="setFilter('all', this)">All</button>
            <button class="fpill" onclick="setFilter('pending', this)">🟡 Pending</button>
            <button class="fpill" onclick="setFilter('progress', this)">🔵 In Progress</button>
            <button class="fpill" onclick="setFilter('resolved', this)">✅ Resolved</button>
            <button class="fpill" onclick="setFilter('critical', this)">🔴 Critical</button>
        </div>

        <div id="rList" class="flex flex-col gap-3 fu d3">
            </div>
    </main>
</div></div><!-- /max-width -->
</main>
</div><!-- /main-area -->
</div><!-- /app-layout -->

<script src="assets/js/app.js"></script>
<script src="assets/js/shared-ui.js"></script>

<a href="report.html" class="fab-p" onclick="alert('Navigating to Report Page...')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
    New Report
</a>

<script>
const REPORTS = [
    {id:'CP-2025-0042', icon:'💡', title:'Broken streetlight – Sector 12', loc:'Sector 12, Gomti Nagar', status:'pending', prog:10, date:'2h ago', dept:'Municipal Corp, Zone 3', eta:'24–48 hours'},
    {id:'CP-2025-0041', icon:'🗑️', title:'Garbage overflow – Market Road', loc:'Market Road, Hazratganj', status:'critical', prog:5, date:'4h ago', dept:'Nagar Nigam Sanitation', eta:'Priority escalated'},
    {id:'CP-2025-0040', icon:'💧', title:'Water leakage – Civil Lines', loc:'Civil Lines, Lucknow', status:'progress', prog:55, date:'6h ago', dept:'Jal Kal Vibhag, Team B', eta:'Technician ETA: 1.5h'},
    {id:'CP-2025-0039', icon:'🛣️', title:'Pothole – Ring Road', loc:'Ring Road, Aliganj', status:'resolved', prog:100, date:'1d ago', dept:'PWD', eta:'Patching complete ✓'},
    {id:'CP-2025-0038', icon:'⚡', title:'Low hanging cable – Park Road', loc:'Park Road, Indira Nagar', status:'critical', prog:20, date:'1d ago', dept:'UPPCL, Maintenance', eta:'Team dispatched'},
    {id:'CP-2025-0037', icon:'🛣️', title:'Road cave-in near underpass', loc:'Underpass, Chowk', status:'progress', prog:70, date:'2d ago', dept:'PWD + Traffic Dept', eta:'2 days to complete'}
];

const SC = {
    pending: { lbl:'Pending', cls:'bg-amber-500/10 text-amber-500 border-amber-500/20', bar:'#f59e0b' },
    progress: { lbl:'In Progress', cls:'bg-blue-500/10 text-blue-400 border-blue-500/20', bar:'#3b82f6' },
    resolved: { lbl:'Resolved', cls:'bg-emerald-500/10 text-emerald-400 border-emerald-500/20', bar:'#10b981' },
    critical: { lbl:'Critical', cls:'bg-red-500/10 text-red-400 border-red-500/20', bar:'#ef4444' }
};

let activeF = 'all', searchQ = '';

function renderReports() {
    const list = document.getElementById('rList');
    const items = REPORTS.filter(r => 
        (activeF === 'all' || r.status === activeF) && 
        (r.title.toLowerCase().includes(searchQ) || r.loc.toLowerCase().includes(searchQ) || r.id.toLowerCase().includes(searchQ))
    );
    
    if(!items.length) {
        list.innerHTML = `
            <div class="text-center py-12 text-slate-500">
                <div class="text-4xl mb-3 opacity-50">🔍</div>
                <div class="syne-font font-bold text-lg">No reports found</div>
                <p class="text-xs mt-1">Try adjusting your filters or search query.</p>
            </div>`;
        return;
    }

    // Refactored UI Template using Tailwind Utility Classes
    list.innerHTML = items.map((r, i) => {
        const s = SC[r.status];
        return `
        <div class="rrow" id="rr${i}" onclick="toggleRpt(${i})">
            <div class="rtop flex items-center gap-4">
                <div class="w-12 h-12 rounded-xl bg-white/5 flex items-center justify-center text-2xl flex-shrink-0">${r.icon}</div>
                <div class="flex-1 min-w-0">
                    <div class="flex items-center gap-2 mb-1 flex-wrap">
                        <span class="mono-font text-[10px] text-slate-500 font-bold">${r.id}</span>
                        <span class="text-[9px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-full border ${s.cls}">${s.lbl}</span>
                    </div>
                    <div class="font-bold text-sm text-slate-200 truncate">${r.title}</div>
                    <div class="text-xs text-slate-400 mt-0.5 truncate">📍 ${r.loc} · ${r.date}</div>
                </div>
                <svg class="chevron w-5 h-5 text-slate-500 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="6 9 12 15 18 9"/>
                </svg>
            </div>
            
            <div class="rdetail" id="rd${i}">
                <div class="bg-black/20 border border-white/5 rounded-xl p-4 mt-2">
                    <div class="text-xs text-slate-400 leading-relaxed mb-3">
                        <div class="flex items-center gap-2 mb-1"><span>🔧</span> <strong>Assigned to:</strong> ${r.dept}</div>
                        <div class="flex items-center gap-2"><span>🕐</span> <strong>Status update:</strong> ${r.eta}</div>
                    </div>
                    
                    <div class="h-1.5 bg-white/10 rounded-full overflow-hidden mb-1.5">
                        <div class="h-full rounded-full transition-all duration-1000 ease-out" style="width: ${r.prog}%; background: ${s.bar}; box-shadow: 0 0 8px ${s.bar};"></div>
                    </div>
                    
                    <div class="flex justify-between items-center text-[10px] uppercase font-bold text-slate-500">
                        <span>Resolution Progress</span>
                        <span style="color: ${s.bar};">${r.prog}%</span>
                    </div>
                </div>
            </div>
        </div>`;
    }).join('');
}

function toggleRpt(i) {
    const row = document.getElementById('rr'+i);
    const det = document.getElementById('rd'+i);
    if(!row || !det) return;
    
    const isOpen = row.classList.contains('exp');
    
    // Close all others
    document.querySelectorAll('.rrow').forEach((r, j) => {
        r.classList.remove('exp');
        const d = document.getElementById('rd'+j);
        if(d) d.classList.remove('open');
    });
    
    // Open the clicked one if it wasn't already open
    if(!isOpen) {
        row.classList.add('exp');
        det.classList.add('open');
    }
}

function setFilter(f, btn) {
    activeF = f;
    document.querySelectorAll('.fpill').forEach(b => b.classList.remove('act'));
    btn.classList.add('act');
    renderReports();
}

function filterReports(v) {
    searchQ = v.toLowerCase();
    renderReports();
}

// Initial render
renderReports();
</script>
</body>
</html>
